spring:
  application:
    name: ai-file-conversion

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

  # DeepSeek AI 配置（兼容 OpenAI 的 API）
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat

# 自定义应用设置
app:
  file:
    upload-dir: ${user.dir}/uploads
    expiration-minutes: 60

server:
  port: 8080
